<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link href="../static/css/admin.css" rel="stylesheet">
</head>

<body>

<div class="container py-4">

    <h3 class="mb-4 text-center fw-bold">Admin Dashboard</h3>

    <div class="row g-3 mb-4">

        <div class="col-md-3">
            <div class="card dashboard-card shadow-sm p-3">
                <div class="card-title">Total Products</div>
                <div class="card-value" id="totalProducts">0</div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card dashboard-card shadow-sm p-3">
                <div class="card-title">Orders Delivered Today</div>
                <div class="card-value" id="ordersToday">0</div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card dashboard-card shadow-sm p-3">
                <div class="card-title">Earnings Today</div>
                <div class="card-value text-success">₹<span id="earningsToday">0</span></div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card dashboard-card shadow-sm p-3">
                <div class="card-title">Pending Orders</div>
                <div class="card-value text-warning" id="pendingOrders">0</div>
            </div>
        </div>

    </div>

    <!-- Add Product -->
    <div class="card shadow-sm p-4 mb-4">
        <h5>Add Product</h5>
        <div class="row g-3">
            <div class="col-md-3">
                <input id="pName" class="form-control" placeholder="Product Name">
            </div>
            <div class="col-md-2">
                <input id="pPrice" type="number" class="form-control" placeholder="Price">
            </div>
            <div class="col-md-2">
                <input id="pStock" type="number" class="form-control" placeholder="Stock">
            </div>
            <div class="col-md-3">
                <select id="pCategory" class="form-select">
                    <option value="vegetables">Vegetables</option>
                    <option value="fruits">Fruits</option>
                    <option value="dairy">Dairy</option>
                    <option value="groceries">Groceries</option>
                    <option value="snacks">Snacks</option>
                    <option value="beverages">Beverages</option>
                    <option value="household">Household</option>
                    <option value="personalcare">Personal Care</option>
                </select>
            </div>
            <div class="col-md-2">
                <button class="btn btn-primary w-100" onclick="addProduct()">Add</button>
            </div>
        </div>
    </div>

    <!-- Products -->
    <div class="card shadow-sm p-4 mb-4">
        <h5>All Products</h5>
        <div id="productList"></div>
    </div>

    <!-- Orders -->
    <div class="card shadow-sm p-4">
        <h5>Orders</h5>
        <div id="ordersList"></div>
    </div>

</div>

<!-- Admin JS -->
<script src="../static/js/admin.js"></script>

</body>
</html>
