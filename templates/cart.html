<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cart | ResidentMarket</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../static/css/style.css" rel="stylesheet">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-success px-3">
    <a class="navbar-brand fw-bold" href="index.html">ResidentMarket</a>
    <div class="ms-auto">
        <a href="items.html?category=all" class="btn btn-light btn-sm">
            Continue Shopping
        </a>
    </div>
</nav>

<!-- CART CONTENT -->
<div class="container py-5">
    <h2 class="fw-bold mb-4">Your Cart</h2>

    <div id="cart-items" class="mb-4"></div>

    <div class="d-flex justify-content-between align-items-center border-top pt-3">
        <h4 class="fw-bold">Total: ₹<span id="cart-total">0</span></h4>

        <button class="btn btn-success" onclick="placeOrder()">
            Place Order
        </button>
    </div>
</div>

<!-- JS -->
<script src="../static/js/cart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
