<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Success | Resident Market</title>
    <link rel="stylesheet" href="../static/css/style.css">
    <style>
        .success-container { text-align: center; padding: 60px 20px; }
        .icon-circle { width: 80px; height: 80px; background: #27ae60; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 40px; margin: 0 auto 20px; }
        .btn-home { display: inline-block; padding: 15px 30px; background: var(--primary); color: white; text-decoration: none; border-radius: 30px; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="success-container">
        <div class="icon-circle">✓</div>
        <h1>Order Placed!</h1>
        <p>Your order has been sent to the shop owner.</p>
        <p>Delivery to your flat is on the way. Please keep change/UPI ready for payment.</p>
        
        <a href="/" class="btn-home">Continue Shopping</a>
    </div>
</body>
</html>
